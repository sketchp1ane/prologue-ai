name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm check
